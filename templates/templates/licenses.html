<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{app_name}}</title><link rel="stylesheet" href="/static/style.css"></head><body><header><b>OST TECH License Manager</b><nav><a href="/dashboard">الطلبات</a><a href="/manual">إدخال يدوي</a><a href="/licenses">التراخيص</a><a href="/logout">خروج</a></nav></header><main><section class="panel"><h2>التراخيص الصادرة</h2><div class="table-wrap"><table><thead><tr><th>#</th><th>المنتج</th><th>العميل</th><th>الهاتف</th><th>الجهاز</th><th>الكود</th><th>الحالة</th><th>الإجراء</th></tr></thead><tbody>{% for l in lics %}<tr><td>{{l.id}}</td><td>{{l.product_code}}</td><td>{{l.client_name}}</td><td>{{l.phone}}</td><td class="mono">{{l.device_id}}</td><td class="mono code">{{l.license_code}}</td><td><span class="status {{l.status}}">{{l.status}}</span></td><td>{% if l.status=='active' %}<form method="post" action="/revoke/{{l.id}}"><button class="danger">إلغاء</button></form>{% else %}-{% endif %}</td></tr>{% endfor %}</tbody></table></div></section></main></body></html>
